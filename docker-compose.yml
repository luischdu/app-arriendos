version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arriendospro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arriendospro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arriendospro_dev}
      POSTGRES_DB: ${POSTGRES_DB:-arriendospro}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U arriendospro']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arriendospro_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: arriendospro_api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
